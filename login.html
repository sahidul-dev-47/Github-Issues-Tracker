<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- tailwind css and daisy ui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- google fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<!-- font awesome  -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />



</head>
<body class="min-h-screen max-w-md bg-white border- mx-auto flex justify-center items-center">
   <section id="login" class="login-section bg-white shadow-lg rounded-xl p-8 text-center mt-16 mb-16 ">
    <div class="flex justify-center">
        <img src="./assets/github-logo.png" alt="" class="w-24 h-24 rounded-full">
    </div>
    <h2 class="text-2xl font-bold text-center mt-5 mb-1"> GitHub Issues Tracker</h2>
    <p class="text-color-gray text-center">Sign in to manage your issues</p>
     <fieldset class="fieldset rounded-box w-xs p-4">

  <label class="label text-sm font-bold text-black">Username</label>
  <input id="Username-input" type="text" class="input text-gray-900 font-semibold" placeholder="Enter Username" />

  <label class="label text-sm font-bold text-black">Password</label>
  <input id="password-input" type="password" class="input  text-gray-900 font-semibold" placeholder=" Enter Password" />

  <button id="btn-sign-in" class="btn btn-primary mt-4">Sign In</button>
</fieldset>
<div class="relative my-6">
    <div class=" border-t- border-[#E4E4E7]"></div>
    <span class="absolute left-1/2 -translate-x-1/2 -top-3 bg-white px-3  text-black font-medium text-sm">OR</span>
    <div class="flex-grow border-t"></div>
</div>
 <p class="font-semibold text-color-gray mb-4">Demo Credentials:</p>
<div class="bg-[#F8FAFC] p-8 rounded-xl">
    <p class="font-bold text-xl"> Username : <span class="font-medium">admin</span></p>
    <p class="font-bold text-xl"> Password : <span class="font-medium">admin123</span></p>
</div>
   </section>


    <script src="./script/login.js"></script>
</body>
</html>
